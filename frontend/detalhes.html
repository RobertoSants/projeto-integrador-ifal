<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Profissional - Alagoas Regional</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/global.css">
    <style>
        .profile-container { background: white; padding: 30px; border-radius: 8px; margin-top: 30px; display: flex; gap: 30px; flex-wrap: wrap; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .profile-pic { width: 200px; height: 200px; border-radius: 8px; background-size: cover; background-position: center; border: 3px solid var(--cor-al-blue-primary); }
        .profile-info { flex: 1; min-width: 300px; }
        .review-box { background: white; padding: 25px; border-radius: 8px; margin-top: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .rating-select { padding: 10px; width: 100%; max-width: 200px; margin-bottom: 15px; display: block; border-radius: 4px; border: 1px solid #ccc; }
        .comment-area { padding: 10px; width: 100%; height: 80px; margin-bottom: 15px; display: block; border-radius: 4px; border: 1px solid #ccc; font-family: inherit; }
        .btn-whatsapp { background-color: #25D366 !important; color: white !important; font-weight: bold; border: none; }
        .btn-whatsapp:hover { background-color: #128C7E !important; }
        .comment-item { padding: 15px 0; border-bottom: 1px solid #eee; }
        .logo { cursor: pointer; }
        .comment-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; flex-wrap: wrap; gap: 10px; }
        .comment-author { font-weight: bold; color: var(--cor-al-blue-primary); }
        .comment-date { font-size: 12px; color: var(--cor-text-muted); font-weight: normal; margin-left: 8px; }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="window.location.href='index.html'">TALENTOS <span>ALAGOAS</span></div>
        <nav><a href="index.html">← VOLTAR PARA O INÍCIO</a></nav>
    </header>

    <div class="container">
        <div class="profile-container" id="profile-content">
            <p>Carregando dados do profissional...</p>
        </div>

        <div class="review-box">
            <h3>Deixar uma Avaliação Real</h3>
            <form id="review-form">
                <div class="form-group">
                    <label for="review-rating">Sua Nota:</label>
                    <select id="review-rating" class="rating-select" required>
                        <option value="5">⭐⭐⭐⭐⭐ (5)</option>
                        <option value="4">⭐⭐⭐⭐ (4)</option>
                        <option value="3">⭐⭐⭐ (3)</option>
                        <option value="2">⭐⭐ (2)</option>
                        <option value="1">⭐ (1)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="review-comment">Seu Comentário sobre o Serviço:</label>
                    <textarea id="review-comment" class="comment-area" placeholder="Ex: Excelente pedreiro, terminou o acabamento do banheiro antes do prazo e cobrou preço justo." required></textarea>
                </div>
                <button type="submit" class="btn-cta" style="border:none;">PUBLICAR AVALIAÇÃO</button>
            </form>
        </div>

        <div class="review-box" style="margin-top:20px;">
            <h3>Histórico de Depoimentos</h3>
            <div id="comments-list"><p style="color:#666;">Nenhum comentário registrado ainda.</p></div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const workerId = urlParams.get('id');
        const profileContent = document.getElementById('profile-content');
        const commentsList = document.getElementById('comments-list');

        // CORREÇÃO DEFINITIVA: Formata o nome sem deixar o tipo nulo do JS mascarar o usuário como anônimo
        function formatAuthorName(fullName, username) {
            if (!fullName && !username) return "Visitante Anônimo";
            
            // Usa o nome completo se disponível, caso contrário usa o username com @
            const nameToFormat = fullName ? fullName.trim() : `@${username.trim()}`;
            const parts = nameToFormat.split(" ");
            
            if (parts.length <= 2) return nameToFormat;
            
            const filteredParts = parts.filter(p => p.toLowerCase() !== "dos" && p.toLowerCase() !== "da" && p.toLowerCase() !== "de");
            return `${filteredParts[0]} ${filteredParts[1].charAt(0)}.`;
        }

        async function loadProfile() {
            try {
                const response = await fetch(`http://localhost:8000/api/workers/${workerId}/`, { method: "GET", credentials: "omit" });
                if (!response.ok) throw new Error("Erro ao buscar perfil.");
                
                const w = await response.json();
                const defaultImg = "https://i1-c.pinimg.com/1200x/a8/da/22/a8da222be70a71e7858bf752065d5cc3.jpg";
                const setores = w.services ? w.services.map(s => s.name || s).join(', ') : 'Autônomo';

                const ratingTxt = w.avg_rating !== null && w.avg_rating !== undefined 
                    ? parseFloat(w.avg_rating).toFixed(2) 
                    : '5.00';

                profileContent.innerHTML = `
                    <div class="profile-pic" style="background-image: url('${w.photo_url ? w.photo_url : defaultImg}')"></div>
                    <div class="profile-info">
                        <span class="card-local" style="position:static; display:inline-block; margin-bottom:10px;">📍 MUNICÍPIO: ${w.city.toUpperCase()}</span>
                        <h1 style="margin: 0 0 10px 0; color: var(--cor-al-blue-primary);">${w.full_name}</h1>
                        <p style="font-size:16px; color:#444; margin-bottom:15px;"><strong>Eixo de Atuação:</strong> ${setores}</p>
                        <p style="font-size:18px; color:var(--cor-al-red-primary); margin-bottom:20px;"><strong>Reputação:</strong> ⭐ ${ratingTxt}</p>
                        <div style="border-top:1px solid #eee; padding-top:15px; margin-bottom:25px;">
                            <h3 style="margin-bottom:10px;">Apresentação Profissional:</h3>
                            <p style="line-height:1.6; color:#555;">${w.bio || 'Nenhuma biografia informada.'}</p>
                        </div>
                        <a href="https://wa.me/${w.phone}" target="_blank" class="btn-cta btn-whatsapp" style="display:inline-block; text-align:center; box-shadow:none;">CONTACTAR VIA WHATSAPP</a>
                    </div>
                `;
                
                loadReviews();
            } catch (err) {
                profileContent.innerHTML = "<p>Erro ao carregar o perfil profissional.</p>";
            }
        }

        async function loadReviews() {
            try {
                const res = await fetch(`http://localhost:8000/api/workers/${workerId}/reviews/`, { method: "GET", credentials: "omit" });
                if (res.ok) {
                    const reviews = await res.json();
                    if(reviews.length > 0) {
                        commentsList.innerHTML = reviews.map(r => {
                            // Envia ambos os campos para a nova lógica de tratamento visual
                            const nameDisplay = formatAuthorName(r.author_fullname, r.author_username);
                            const dateDisplay = new Date(r.created_at).toLocaleDateString('pt-BR');

                            return `
                                <div class="comment-item">
                                    <div class="comment-header">
                                        <span class="comment-author">👤 ${nameDisplay} <span class="comment-date">em ${dateDisplay}</span></span>
                                        <div style="color:var(--cor-al-red-primary); font-weight:bold;">Nota: ${'⭐'.repeat(r.rating)}</div>
                                    </div>
                                    <p style="color:#555; margin:0; padding-left: 5px;">"${r.comment}"</p>
                                </div>
                            `;
                        }).join('');
                    } else {
                        commentsList.innerHTML = `<p style="color:#666;">Nenhum comentário registrado ainda.</p>`;
                    }
                }
            } catch (e) { console.error("Erro ao listar depoimentos", e); }
        }

        document.getElementById('review-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const ratingValue = document.getElementById('review-rating').value;
            const commentValue = document.getElementById('review-comment').value;

            try {
                const res = await fetch(`http://localhost:8000/api/workers/${workerId}/reviews/`, {
                    method: "POST",
                    credentials: "include",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ rating: parseInt(ratingValue), comment: commentValue })
                });

                if (res.ok) {
                    alert("Avaliação e depoimento publicados!");
                    document.getElementById('review-comment').value = "";
                    loadProfile();
                } else {
                    alert("Erro ao salvar avaliação. Certifique-se de preencher os campos corretamente.");
                }
            } catch (err) { alert("Erro de rede ao submeter comentário."); }
        });

        loadProfile();
    </script>
</body>
</html>
